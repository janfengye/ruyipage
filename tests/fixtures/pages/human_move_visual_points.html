<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Human Move Visual Points</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background:
        linear-gradient(180deg, rgba(15, 23, 42, 0.96), rgba(17, 24, 39, 1)),
        radial-gradient(circle at top left, rgba(59, 130, 246, 0.16), transparent 28%),
        radial-gradient(circle at bottom right, rgba(168, 85, 247, 0.18), transparent 32%);
      color: #e5e7eb;
    }

    #hud {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 10;
      padding: 10px 12px;
      border-radius: 10px;
      background: rgba(15, 23, 42, 0.8);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.28);
      font: 13px/1.5 monospace;
      max-width: 460px;
      white-space: pre-wrap;
    }

    #stage {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .point {
      position: absolute;
      width: 10px;
      height: 10px;
      margin-left: -5px;
      margin-top: -5px;
      border-radius: 50%;
      background: #f8fafc;
      box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.22), 0 0 16px rgba(255, 255, 255, 0.24);
    }

    .point.hit {
      background: #facc15;
      box-shadow: 0 0 0 3px rgba(250, 204, 21, 0.34), 0 0 22px rgba(250, 204, 21, 0.42);
    }

    .label {
      position: absolute;
      transform: translate(10px, -10px);
      font: 12px/1.3 monospace;
      color: #cbd5e1;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="hud">ready</div>
  <div id="stage"></div>
  <script>
    window.__points = [
      { id: 'p1',  x: 140,  y: 110 },
      { id: 'p2',  x: 360,  y: 160 },
      { id: 'p3',  x: 620,  y: 120 },
      { id: 'p4',  x: 920,  y: 180 },
      { id: 'p5',  x: 1210, y: 130 },
      { id: 'p6',  x: 260,  y: 410 },
      { id: 'p7',  x: 560,  y: 520 },
      { id: 'p8',  x: 860,  y: 430 },
      { id: 'p9',  x: 1120, y: 560 },
      { id: 'p10', x: 1320, y: 360 }
    ];

    window.__clicks = [];
    window.__lastClick = null;
    window.__hitPoints = [];

    var stage = document.getElementById('stage');
    window.__points.forEach(function (pt) {
      var dot = document.createElement('div');
      dot.className = 'point';
      dot.id = pt.id;
      dot.style.left = pt.x + 'px';
      dot.style.top = pt.y + 'px';
      stage.appendChild(dot);

      var label = document.createElement('div');
      label.className = 'label';
      label.textContent = pt.id + ' (' + pt.x + ',' + pt.y + ')';
      label.style.left = pt.x + 'px';
      label.style.top = pt.y + 'px';
      stage.appendChild(label);
    });

    window.__resetClicks = function () {
      window.__clicks = [];
      window.__lastClick = null;
      window.__hitPoints = [];
      document.getElementById('hud').textContent = 'ready';
      document.querySelectorAll('.point.hit').forEach(function (el) {
        el.classList.remove('hit');
      });
    };

    document.addEventListener('click', function (e) {
      var rec = {
        x: e.clientX,
        y: e.clientY,
        target: e.target.id || e.target.tagName,
        trusted: e.isTrusted,
      };
      window.__clicks.push(rec);
      window.__lastClick = rec;

      var matched = window.__points.find(function (pt) {
        return pt.x === rec.x && pt.y === rec.y;
      });

      if (matched) {
        if (window.__hitPoints.indexOf(matched.id) === -1) {
          window.__hitPoints.push(matched.id);
        }
        var el = document.getElementById(matched.id);
        if (el) {
          el.classList.add('hit');
        }
        document.getElementById('hud').textContent = 'hit ' + matched.id + ' @ (' + rec.x + ',' + rec.y + ')';
      } else {
        document.getElementById('hud').textContent = 'miss @ (' + rec.x + ',' + rec.y + ')';
      }
    });
  </script>
</body>
</html>
