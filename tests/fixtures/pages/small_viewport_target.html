<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Small Viewport Target</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    #target {
      position: absolute;
      left: 130px;
      top: 90px;
      width: 20px;
      height: 20px;
      background: #2c7be5;
    }

    #result {
      position: absolute;
      left: 8px;
      top: 8px;
      font-size: 12px;
    }

    iframe {
      position: absolute;
      left: 8px;
      top: 30px;
      width: 100px;
      height: 70px;
      border: 1px solid #444;
    }
  </style>
</head>
<body>
  <div id="result">ready</div>
  <div id="target"></div>
  <iframe id="tiny-frame" srcdoc="<!DOCTYPE html><html><body style='margin:0;overflow:hidden'><button id='inner-btn' style='position:absolute;left:70px;top:42px;width:24px;height:20px'>go</button><script>window.__innerHit = false; document.getElementById('inner-btn').addEventListener('click', function(){ window.__innerHit = true; });</script></body></html>"></iframe>
  <script>
    window.__lastClick = null;
    window.__hitTarget = false;
    document.getElementById('target').addEventListener('click', function (e) {
      window.__lastClick = { x: e.clientX, y: e.clientY, trusted: e.isTrusted };
      window.__hitTarget = true;
      document.getElementById('result').textContent = 'clicked';
    });
  </script>
</body>
</html>
