<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>Custom Pointer Drag Fixture</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #f6f7fb;
      font-family: sans-serif;
    }

    #stage {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #track {
      position: fixed;
      left: 20px;
      top: 40px;
      width: 360px;
      height: 44px;
      border-radius: 999px;
      background: linear-gradient(90deg, #d9dee8, #cfd6e4);
      border: 1px solid #aab2c0;
      box-sizing: border-box;
      user-select: none;
      touch-action: none;
    }

    #handle {
      position: absolute;
      left: 0;
      top: 0;
      width: 60px;
      height: 44px;
      border-radius: 999px;
      background: linear-gradient(180deg, #ff7a18, #ff4d6d);
      box-shadow: 0 4px 12px rgba(255, 77, 109, 0.25);
      cursor: grab;
      touch-action: none;
      will-change: left;
    }

    #target {
      position: fixed;
      left: 332px;
      top: 40px;
      width: 40px;
      height: 44px;
      border-radius: 8px;
      background: rgba(47, 111, 237, 0.18);
      border: 1px solid rgba(47, 111, 237, 0.4);
      box-sizing: border-box;
    }

    #target::before {
      content: "";
      position: absolute;
      inset: 12px;
      border-radius: 4px;
      background: rgba(47, 111, 237, 0.4);
    }
  </style>
</head>
<body>
  <div id="stage">
    <div id="track">
      <div id="handle"></div>
    </div>
    <div id="target"></div>
  </div>
  <script>
    (function () {
      const track = document.getElementById('track');
      const handle = document.getElementById('handle');
      const target = document.getElementById('target');
      const events = [];
      const captures = [];
      const maxOffset = 300;
      let offset = 0;
      let dragging = false;
      let activePointerId = null;
      let grabOffset = 0;
      let hitTarget = false;

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function record(event) {
        const entry = {
          type: event.type,
          buttons: event.buttons,
          clientX: Math.round(event.clientX),
          clientY: Math.round(event.clientY),
          pointerId: event.pointerId,
          captured: handle.hasPointerCapture(event.pointerId),
          target: event.target.id || event.target.tagName.toLowerCase(),
        };
        if (event.type === 'pointermove') {
          entry.hitTarget = hitTarget;
        }
        events.push(entry);
      }

      function setOffset(nextOffset) {
        offset = clamp(Math.round(nextOffset), 0, maxOffset);
        handle.style.left = `${offset}px`;
      }

      handle.addEventListener('pointerdown', (event) => {
        record(event);
        dragging = true;
        activePointerId = event.pointerId;
        grabOffset = event.clientX - handle.getBoundingClientRect().left;
        handle.setPointerCapture(event.pointerId);
      });

      handle.addEventListener('gotpointercapture', (event) => {
        captures.push('got');
        record(event);
      });

      function routePointerMove(event) {
        if (!dragging || event.pointerId !== activePointerId) {
          return;
        }
        const targetRect = target.getBoundingClientRect();
        hitTarget =
          event.clientX >= targetRect.left &&
          event.clientX <= targetRect.right &&
          event.clientY >= targetRect.top &&
          event.clientY <= targetRect.bottom;
        record(event);
        if (event.buttons !== 1) {
          return;
        }
        const trackLeft = track.getBoundingClientRect().left;
        setOffset(event.clientX - trackLeft - grabOffset);
      }

      function routePointerUp(event) {
        if (event.pointerId !== activePointerId) {
          return;
        }
        record(event);
        dragging = false;
        activePointerId = null;
        if (handle.hasPointerCapture(event.pointerId)) {
          handle.releasePointerCapture(event.pointerId);
        }
      }

      document.addEventListener('pointermove', routePointerMove);
      document.addEventListener('pointerup', routePointerUp);

      handle.addEventListener('lostpointercapture', (event) => {
        captures.push('lost');
        record(event);
      });

      window.__customPointerDrag = {
        reset() {
          events.length = 0;
          captures.length = 0;
          dragging = false;
          activePointerId = null;
          grabOffset = 0;
          hitTarget = false;
          setOffset(0);
        },
        state() {
          return {
            offset,
            hitTarget,
            dragging,
            events: events.map((event) => ({...event})),
            captures: captures.slice(),
          };
        },
      };

      window.__customPointerDrag.reset();
      window.__ruyi_fixture_ready = true;
    }());
  </script>
</body>
</html>
