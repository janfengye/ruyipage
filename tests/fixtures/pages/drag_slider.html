<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Drag slider fixture</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 80px;
    }

    #track {
      position: relative;
      width: 360px;
      height: 44px;
      background: #d9dee8;
      border: 1px solid #aab2c0;
      user-select: none;
      touch-action: none;
    }

    #knob {
      position: absolute;
      left: 0;
      top: 0;
      width: 44px;
      height: 44px;
      background: #2f6fed;
      cursor: grab;
      touch-action: none;
    }

    #knob.dragging {
      cursor: grabbing;
    }
  </style>
</head>
<body>
  <div id="track">
    <div id="knob"></div>
  </div>

  <script>
    const track = document.getElementById('track');
    const knob = document.getElementById('knob');
    const events = [];
    let dragging = false;
    let grabOffset = 0;

    function record(event) {
      events.push({
        type: event.type,
        x: Math.round(event.clientX),
        y: Math.round(event.clientY),
        buttons: event.buttons,
        button: event.button,
        trusted: event.isTrusted
      });
    }

    function setLeft(value) {
      const max = track.clientWidth - knob.offsetWidth;
      const left = Math.max(0, Math.min(max, value));
      knob.style.left = `${left}px`;
    }

    knob.addEventListener('pointerdown', (event) => {
      record(event);
      dragging = true;
      knob.classList.add('dragging');
      grabOffset = event.clientX - knob.getBoundingClientRect().left;
      knob.setPointerCapture(event.pointerId);
    });

    knob.addEventListener('pointermove', (event) => {
      record(event);
      if (!dragging || event.buttons !== 1) {
        return;
      }
      setLeft(event.clientX - track.getBoundingClientRect().left - grabOffset);
    });

    knob.addEventListener('pointerup', (event) => {
      record(event);
      dragging = false;
      knob.classList.remove('dragging');
      try {
        knob.releasePointerCapture(event.pointerId);
      } catch (e) {
      }
    });

    window.__dragSlider = {
      points() {
        const knobRect = knob.getBoundingClientRect();
        const trackRect = track.getBoundingClientRect();
        const y = Math.round(knobRect.top + knobRect.height / 2);
        return {
          start: {
            x: Math.round(knobRect.left + knobRect.width / 2),
            y
          },
          end: {
            x: Math.round(trackRect.left + trackRect.width - knobRect.width / 2 - 4),
            y
          }
        };
      },
      state() {
        return {
          left: Math.round(knob.getBoundingClientRect().left - track.getBoundingClientRect().left),
          events
        };
      }
    };
  </script>
</body>
</html>
